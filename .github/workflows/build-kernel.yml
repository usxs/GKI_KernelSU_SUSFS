name: GKI Kernel Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        options:
          - android12
          - android13
          - android14
          - android15
        default: android13
      kernel_version:
        description: 'Kernel 版本'
        required: true
        type: choice
        options:
          - "5.10"
          - "5.15"
          - "6.1"
          - "6.6"
        default: "5.15"
      kernels_to_build:
        description: '要构建的 Sub Level (用逗号分隔，如 124,145 或留空使用默认)'
        required: false
        type: string
        default: ''
      kernelsu_version:
        description: 'SukiSU 版本'
        required: true
        type: choice
        options:
          - Stable(标准)
          - Dev(开发)
        default: Stable(标准)
      kernelsu_commit:
        description: '指定 KernelSU commit hash (可选，留空使用最新)'
        required: false
        type: string
        default: ''
      susfs_commit:
        description: '指定 SUSFS commit hash 或相对偏移 (如 HEAD~1)'
        required: false
        type: string
        default: ''
      use_zram:
        description: '启用 ZRAM (LZ4KD)'
        required: true
        type: boolean
        default: true
      use_kpm:
        description: '启用 KPM'
        required: true
        type: boolean
        default: true
      BBG:
        description: '启用 Baseband-guard (LSM)'
        required: true
        type: boolean
        default: false
      supp_op:
        description: '启用 OnePlus 8E 支持'
        required: true
        type: boolean
        default: false
      set_defbbr:
        description: '设置 BBR 为默认拥塞算法'
        required: true
        type: boolean
        default: false
      make_release:
        description: '创建 GitHub Release'
        required: true
        type: boolean
        default: true
      custom_version:
        description: '自定义版本名称 (可选)'
        required: false
        type: string
        default: ''

env:
  PYTHON_VERSION: '3.10'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_configs: ${{ steps.generate-configs.outputs.configs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install PyYAML

      - name: Generate build configs
        id: generate-configs
        run: |
          python3 << 'EOF'
          import json
          import sys
          
          # 默认配置矩阵
          matrix = {
              "android12-5.10": [
                  {"sub_level": "136", "os_patch_level": "2022-11", "revision": "r15"},
                  {"sub_level": "198", "os_patch_level": "2024-01", "revision": "r17"},
                  {"sub_level": "209", "os_patch_level": "2024-05", "revision": "r13"},
                  {"sub_level": "236", "os_patch_level": "2025-05", "revision": "r1"},
                  {"sub_level": "X", "os_patch_level": "lts", "revision": "r1"},
              ],
              "android13-5.10": [
                  {"sub_level": "X", "os_patch_level": "lts"},
              ],
              "android13-5.15": [
                  {"sub_level": "74", "os_patch_level": "2023-01"},
                  {"sub_level": "123", "os_patch_level": "2023-11"},
                  {"sub_level": "148", "os_patch_level": "2024-05"},
                  {"sub_level": "170", "os_patch_level": "2025-01"},
                  {"sub_level": "178", "os_patch_level": "2025-03"},
                  {"sub_level": "180", "os_patch_level": "2025-05"},
                  {"sub_level": "189", "os_patch_level": "2025-09"},
              ],
              "android14-5.15": [
                  {"sub_level": "X", "os_patch_level": "lts"},
              ],
              "android14-6.1": [
                  {"sub_level": "78", "os_patch_level": "2024-06"},
                  {"sub_level": "90", "os_patch_level": "2024-08"},
                  {"sub_level": "99", "os_patch_level": "2024-10"},
                  {"sub_level": "124", "os_patch_level": "2025-02"},
                  {"sub_level": "145", "os_patch_level": "2025-09"},
              ],
              "android15-6.6": [
                  {"sub_level": "50", "os_patch_level": "2024-10"},
                  {"sub_level": "66", "os_patch_level": "2025-02"},
                  {"sub_level": "102", "os_patch_level": "2025-10"},
              ],
          }
          
          av = "${{ github.event.inputs.android_version }}"
          kv = "${{ github.event.inputs.kernel_version }}"
          key = f"{av}-{kv}"
          
          # 获取指定的 sub levels
          specified = "${{ github.event.inputs.kernels_to_build }}"
          if specified:
              # 解析用户指定的 sub levels
              selected = []
              for sl in specified.split(","):
                  sl = sl.strip()
                  for cfg in matrix.get(key, []):
                      if cfg["sub_level"] == sl:
                          selected.append(cfg)
                          break
              configs = selected if selected else matrix.get(key, [])
          else:
              configs = matrix.get(key, [])
          
          print(f"::set-output name=configs::{json.dumps(configs)}")
          EOF

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.prepare.outputs.build_configs) }}
    env:
      ANDROID_VERSION: ${{ github.event.inputs.android_version }}
      KERNEL_VERSION: ${{ github.event.inputs.kernel_version }}
      KSU_VERSION: ${{ github.event.inputs.kernelsu_version }}
      KSU_COMMIT: ${{ github.event.inputs.kernelsu_commit }}
      SUSFS_COMMIT: ${{ github.event.inputs.susfs_commit }}
      USE_ZRAM: ${{ github.event.inputs.use_zram }}
      USE_KPM: ${{ github.event.inputs.use_kpm }}
      USE_BBG: ${{ github.event.inputs.BBG }}
      SUPPORT_OP8E: ${{ github.event.inputs.supp_op }}
      SET_DEFAULT_BBR: ${{ github.event.inputs.set_defbbr }}
      MAKE_RELEASE: ${{ github.event.inputs.make_release }}
      CUSTOM_VERSION: ${{ github.event.inputs.custom_version }}
      SUB_LEVEL: ${{ matrix.config.sub_level }}
      OS_PATCH_LEVEL: ${{ matrix.config.os_patch_level }}
      REVISION: ${{ matrix.config.revision || '' }}

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-swapfile: 'true'
          verbose: 'true'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y ccache python3 git curl wget zip unzip
          pip install PyYAML

      - name: Clone build system
        run: |
          cp -r ./.github/build-system ./build-system

      - name: Configure ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}-${{ env.SUB_LEVEL }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}-${{ env.SUB_LEVEL }}-ccache-

      - name: Run build
        run: |
          cd ./build-system
          
          # 构建命令
          ARGS="--android ${{ env.ANDROID_VERSION }}"
          ARGS="$ARGS --kernel ${{ env.KERNEL_VERSION }}"
          ARGS="$ARGS --sub-level ${{ env.SUB_LEVEL }}"
          ARGS="$ARGS --os-patch ${{ env.OS_PATCH_LEVEL }}"
          ARGS="$ARGS --ksu-version ${{ env.KSU_VERSION }}"
          ARGS="$ARGS --no-release"
          
          # 可选参数
          if [ "${{ env.USE_ZRAM }}" = "false" ]; then
            ARGS="$ARGS --no-zram"
          fi
          if [ "${{ env.USE_KPM }}" = "false" ]; then
            ARGS="$ARGS --no-kpm"
          fi
          if [ "${{ env.USE_BBG }}" = "true" ]; then
            ARGS="$ARGS --bbg"
          fi
          if [ "${{ env.SUPPORT_OP8E }}" = "true" ]; then
            ARGS="$ARGS --op8e"
          fi
          if [ "${{ env.SET_DEFAULT_BBR }}" = "true" ]; then
            ARGS="$ARGS --bbr"
          fi
          if [ -n "${{ env.KSU_COMMIT }}" ]; then
            ARGS="$ARGS --ksu-commit ${{ env.KSU_COMMIT }}"
          fi
          if [ -n "${{ env.SUSFS_COMMIT }}" ]; then
            ARGS="$ARGS --susfs-commit ${{ env.SUSFS_COMMIT }}"
          fi
          if [ -n "${{ env.CUSTOM_VERSION }}" ]; then
            ARGS="$ARGS --version ${{ env.CUSTOM_VERSION }}"
          fi
          
          echo "Build command: python3 build.py $ARGS"
          python3 build.py $ARGS

      - name: Prepare artifacts
        run: |
          CONFIG="${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}-${{ env.SUB_LEVEL }}"
          mkdir -p artifacts
          
          # 查找并复制产物
          find . -name "*.zip" -type f -exec cp {} artifacts/ \;
          find . -name "*.img" -type f -exec cp {} artifacts/ \;
          
          echo "=== Artifacts ==="
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}-${{ env.SUB_LEVEL }}
          path: artifacts/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.make_release == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: kernel-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          echo "=== Creating checksums ==="
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release name
        run: |
          KSU_VER=$(git ls-remote --tags https://github.com/SukiSU-Ultra/SukiSU-Ultra.git | grep -o 'refs/tags/.*' | cut -d'/' -f3 | head -n1 || echo "latest")
          echo "RELEASE_NAME=GKI Kernel: SukiSU ($KSU_VER) & SUSFS v2.1.0" >> $GITHUB_ENV
          echo "KSU_TAG=$KSU_VER" >> $GITHUB_ENV

      - name: Get commit info
        run: |
          KSU_COMMIT=$(git ls-remote https://github.com/SukiSU-Ultra/SukiSU-Ultra.git refs/heads/main | awk '{ print $1 }' | cut -c1-7)
          echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.0-${{ github.run_number }}
          name: ${{ env.RELEASE_NAME }}
          draft: true
          files: |
            *AnyKernel3*.zip
            *.img
            SHA256SUMS.txt
          body: |
            ## GKI Kernel with SukiSU & SUSFS v2.1.0

            ### KernelSU
            - Commit: `${{ env.KSU_COMMIT }}`
            - Tag: ${{ env.KSU_TAG }}

            ### Features
            - SUSFS v2.1.0
            - Manual Syscall Hooks
            - Magic Mount Support
            - BBR Support
            - LZ4KD Support

            ### Build Info
            - Android: ${{ github.event.inputs.android_version }}
            - Kernel: ${{ github.event.inputs.kernel_version }}
            - ZRAM: ${{ github.event.inputs.use_zram }}
            - KPM: ${{ github.event.inputs.use_kpm }}
