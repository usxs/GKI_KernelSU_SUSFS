name: GKI Kernel Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android 版本'
        required: true
        type: choice
        options:
          - android12
          - android13
          - android14
          - android15
        default: android13
      kernel_version:
        description: 'Kernel 版本'
        required: true
        type: choice
        options:
          - "5.10"
          - "5.15"
          - "6.1"
          - "6.6"
        default: "5.15"
      kernels_to_build:
        description: '要构建的 Sub Level (用逗号分隔，如 124,145 或留空使用默认)'
        required: false
        type: string
        default: ''
      kernelsu_version:
        description: 'SukiSU 版本'
        required: true
        type: choice
        options:
          - Stable(标准)
          - Dev(开发)
        default: Stable(标准)
      kernelsu_commit:
        description: '指定 KernelSU commit hash (可选，留空使用最新)'
        required: false
        type: string
        default: ''
      susfs_commit:
        description: '指定 SUSFS commit hash 或相对偏移 (如 HEAD~1)'
        required: false
        type: string
        default: ''
      use_zram:
        description: '启用 ZRAM (LZ4KD)'
        required: true
        type: boolean
        default: true
      use_kpm:
        description: '启用 KPM'
        required: true
        type: boolean
        default: true
      BBG:
        description: '启用 Baseband-guard (LSM)'
        required: true
        type: boolean
        default: false
      supp_op:
        description: '启用 OnePlus 8E 支持'
        required: true
        type: boolean
        default: false
      set_defbbr:
        description: '设置 BBR 为默认拥塞算法'
        required: true
        type: boolean
        default: false
      make_release:
        description: '创建 GitHub Release'
        required: true
        type: boolean
        default: true
      custom_version:
        description: '自定义版本名称 (可选)'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      sub_level:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string
      kernelsu_version:
        required: true
        type: string
      kernelsu_commit:
        required: false
        type: string
        default: ''
      susfs_commit:
        required: false
        type: string
        default: ''
      use_zram:
        required: false
        type: boolean
        default: true
      use_kpm:
        required: false
        type: boolean
        default: true
      BBG:
        required: false
        type: boolean
        default: false
      supp_op:
        required: false
        type: boolean
        default: false
      set_defbbr:
        required: false
        type: boolean
        default: false
      make_release:
        required: false
        type: boolean
        default: false
      custom_version:
        required: false
        type: string
        default: ''
      revision:
        required: false
        type: string
        default: ''

env:
  PYTHON_VERSION: '3.10'

jobs:
  # workflow_dispatch 时: 生成配置矩阵
  prepare:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      build_configs: ${{ steps.generate-configs.outputs.configs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install PyYAML

      - name: Generate build configs
        id: generate-configs
        run: |
          python3 << 'EOF'
          import json
          
          # 从 JSON 文件加载矩阵
          with open('.github/workflows/matrix.json', 'r') as f:
              matrix = json.load(f)
          
          av = "${{ github.event.inputs.android_version }}"
          kv = "${{ github.event.inputs.kernel_version }}"
          key = f"{av}-{kv}"
          
          specified = "${{ github.event.inputs.kernels_to_build }}"
          if specified:
              selected = []
              for sl in specified.split(","):
                  sl = sl.strip()
                  for cfg in matrix.get(key, []):
                      if cfg["sub_level"] == sl:
                          selected.append(cfg)
                          break
              configs = selected if selected else matrix.get(key, [])
          else:
              configs = matrix.get(key, [])
          
          print(f"::set-output name=configs::{json.dumps(configs)}")
          EOF

  # workflow_dispatch 时: 使用矩阵构建
  build-matrix:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.prepare.outputs.build_configs) }}
    uses: ./.github/workflows/build-single.yml
    with:
      android_version: ${{ github.event.inputs.android_version }}
      kernel_version: ${{ github.event.inputs.kernel_version }}
      sub_level: ${{ matrix.config.sub_level }}
      os_patch_level: ${{ matrix.config.os_patch_level }}
      kernelsu_version: ${{ github.event.inputs.kernelsu_version }}
      kernelsu_commit: ${{ github.event.inputs.kernelsu_commit }}
      susfs_commit: ${{ github.event.inputs.susfs_commit }}
      use_zram: ${{ github.event.inputs.use_zram }}
      use_kpm: ${{ github.event.inputs.use_kpm }}
      BBG: ${{ github.event.inputs.BBG }}
      supp_op: ${{ github.event.inputs.supp_op }}
      set_defbbr: ${{ github.event.inputs.set_defbbr }}
      make_release: false
      custom_version: ${{ github.event.inputs.custom_version }}
      revision: ${{ matrix.config.revision }}

  # workflow_call 时: 直接构建单个配置
  build-single:
    if: github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    uses: ./.github/workflows/build-single.yml
    with:
      android_version: ${{ inputs.android_version }}
      kernel_version: ${{ inputs.kernel_version }}
      sub_level: ${{ inputs.sub_level }}
      os_patch_level: ${{ inputs.os_patch_level }}
      kernelsu_version: ${{ inputs.kernelsu_version }}
      kernelsu_commit: ${{ inputs.kernelsu_commit }}
      susfs_commit: ${{ inputs.susfs_commit }}
      use_zram: ${{ inputs.use_zram }}
      use_kpm: ${{ inputs.use_kpm }}
      BBG: ${{ inputs.BBG }}
      supp_op: ${{ inputs.supp_op }}
      set_defbbr: ${{ inputs.set_defbbr }}
      make_release: ${{ inputs.make_release }}
      custom_version: ${{ inputs.custom_version }}
      revision: ${{ inputs.revision }}

  release:
    needs: build-matrix
    if: ${{ github.event.inputs.make_release == 'true' && github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: '*_kernel-*'
          merge-multiple: true

      - name: Generate checksums
        run: |
          echo "=== Creating checksums ==="
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Get SukiSU info
        run: |
          KSU_TAG=$(git ls-remote --tags https://github.com/SukiSU-Ultra/SukiSU-Ultra.git | grep -o 'refs/tags/.*' | cut -d'/' -f3 | head -n1 || echo "latest")
          KSU_COMMIT=$(git ls-remote https://github.com/SukiSU-Ultra/SukiSU-Ultra.git refs/heads/main | awk '{ print $1 }' | cut -c1-7)
          echo "KSU_TAG=$KSU_TAG" >> $GITHUB_ENV
          echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
          echo "RELEASE_NAME=GKI Kernel: SukiSU ($KSU_TAG) & SUSFS v2.1.0" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.0-${{ github.run_number }}
          name: ${{ env.RELEASE_NAME }}
          draft: true
          files: |
            *AnyKernel3*.zip
            *.img
            SHA256SUMS.txt
          body: |
            ## GKI Kernel with SukiSU & SUSFS v2.1.0

            ### SukiSU Info
            - Tag: `${{ env.KSU_TAG }}`
            - Commit: `${{ env.KSU_COMMIT }}`

            ### Supported Configurations
            - Android 12 (Kernel 5.10)
            - Android 13 (Kernel 5.10, 5.15)
            - Android 14 (Kernel 5.15, 6.1)
            - Android 15 (Kernel 6.6)

            ### Features
            - SUSFS v2.1.0
            - Manual Syscall Hooks
            - Magic Mount Support
            - BBR Support
            - LZ4KD Support
