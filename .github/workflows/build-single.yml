name: Build Single Kernel

on:
  workflow_call:
    inputs:
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      sub_level:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string
      kernelsu_version:
        required: true
        type: string
      kernelsu_commit:
        required: false
        type: string
        default: ''
      susfs_commit:
        required: false
        type: string
        default: ''
      use_zram:
        required: false
        type: boolean
        default: true
      use_kpm:
        required: false
        type: boolean
        default: true
      BBG:
        required: false
        type: boolean
        default: false
      supp_op:
        required: false
        type: boolean
        default: false
      set_defbbr:
        required: false
        type: boolean
        default: false
      make_release:
        required: false
        type: boolean
        default: false
      custom_version:
        required: false
        type: string
        default: ''
      revision:
        required: false
        type: string
        default: ''

env:
  PYTHON_VERSION: '3.10'
  ANDROID_VERSION: ${{ inputs.android_version }}
  KERNEL_VERSION: ${{ inputs.kernel_version }}
  SUB_LEVEL: ${{ inputs.sub_level }}
  OS_PATCH_LEVEL: ${{ inputs.os_patch_level }}
  KSU_VERSION: ${{ inputs.kernelsu_version }}
  KSU_COMMIT: ${{ inputs.kernelsu_commit }}
  SUSFS_COMMIT: ${{ inputs.susfs_commit }}
  USE_ZRAM: ${{ inputs.use_zram }}
  USE_KPM: ${{ inputs.use_kpm }}
  USE_BBG: ${{ inputs.BBG }}
  SUPPORT_OP8E: ${{ inputs.supp_op }}
  SET_DEFAULT_BBR: ${{ inputs.set_defbbr }}
  MAKE_RELEASE: ${{ inputs.make_release }}
  CUSTOM_VERSION: ${{ inputs.custom_version }}
  REVISION: ${{ inputs.revision }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-swapfile: 'true'
          verbose: 'true'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y ccache python3 git curl wget zip unzip
          pip install PyYAML

      - name: Configure ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}-${{ env.SUB_LEVEL }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}-${{ env.SUB_LEVEL }}-ccache-

      - name: Run build
        run: |
          cd ./.github/workflows
          
          # 构建命令
          ARGS="--android ${{ env.ANDROID_VERSION }}"
          ARGS="$ARGS --kernel ${{ env.KERNEL_VERSION }}"
          ARGS="$ARGS --sub-level ${{ env.SUB_LEVEL }}"
          ARGS="$ARGS --os-patch ${{ env.OS_PATCH_LEVEL }}"
          ARGS="$ARGS --ksu-version ${{ env.KSU_VERSION }}"
          ARGS="$ARGS --no-release"
          
          # 可选参数
          if [ "${{ env.USE_ZRAM }}" = "false" ]; then
            ARGS="$ARGS --no-zram"
          fi
          if [ "${{ env.USE_KPM }}" = "false" ]; then
            ARGS="$ARGS --no-kpm"
          fi
          if [ "${{ env.USE_BBG }}" = "true" ]; then
            ARGS="$ARGS --bbg"
          fi
          if [ "${{ env.SUPPORT_OP8E }}" = "true" ]; then
            ARGS="$ARGS --op8e"
          fi
          if [ "${{ env.SET_DEFAULT_BBR }}" = "true" ]; then
            ARGS="$ARGS --bbr"
          fi
          if [ -n "${{ env.KSU_COMMIT }}" ]; then
            ARGS="$ARGS --ksu-commit ${{ env.KSU_COMMIT }}"
          fi
          if [ -n "${{ env.SUSFS_COMMIT }}" ]; then
            ARGS="$ARGS --susfs-commit ${{ env.SUSFS_COMMIT }}"
          fi
          if [ -n "${{ env.CUSTOM_VERSION }}" ]; then
            ARGS="$ARGS --version ${{ env.CUSTOM_VERSION }}"
          fi
          
          echo "Build command: python3 build.py $ARGS"
          python3 build.py $ARGS

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          
          # 查找并复制产物
          find . -name "*.zip" -type f -exec cp {} artifacts/ \;
          find . -name "*.img" -type f -exec cp {} artifacts/ \;
          
          echo "=== Artifacts ==="
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}-${{ env.SUB_LEVEL }}
          path: artifacts/*
